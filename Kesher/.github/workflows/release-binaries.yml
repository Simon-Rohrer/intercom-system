name: Release binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
permissions:
  contents: write

jobs:
  # 1. Backend & Web CI/Release
  build:
    name: Build Backend ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    env:
      GO_VERSION: "1.25.x"
      NODE_VERSION: "22"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Dependencies
        run: npm install

      - name: Build web UI
        run: npm --prefix web run build

      - name: Embed web UI into backend
        run: |
          rm -rf backend/internal/app/embedded_web
          mkdir -p backend/internal/app/embedded_web
          cp -R web/dist/. backend/internal/app/embedded_web/

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Build backend binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist/bin dist/packages
          BUILD_TIMESTAMP="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          bin="kesher-${{ matrix.goos }}-${{ matrix.goarch }}${ext}"
          package_base="kesher-server-${{ matrix.goos }}-${{ matrix.goarch }}"
          cd backend
          go build -trimpath -ldflags="-s -w -X github.com/KesherCom/kesher/backend/internal/app.Version=${VERSION} -X github.com/KesherCom/kesher/backend/internal/app.BuildTimestamp=${BUILD_TIMESTAMP}" -o "../dist/bin/${bin}" ./cmd/server
          cd ..
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -j "dist/packages/${package_base}.zip" "dist/bin/${bin}"
          else
            tar -czf "dist/packages/${package_base}.tar.gz" -C dist/bin "${bin}"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/packages/*

  # 1b. Fast Desktop Validation (runs on every push/tag/dispatch)
  desktop-check:
    name: Desktop Check (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install Dependencies
        run: npm install

      - name: Desktop web check
        run: npm --prefix desktop run build:web

      - name: Desktop native check
        run: |
          cd desktop/src-tauri
          cargo check

  # 2. Windows Desktop
  build-desktop-windows:
    name: Build Desktop (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Build
        run: |
          npm install
          npm --prefix desktop run tauri build -- --bundles nsis,msi

      - name: Prepare release assets
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist/release | Out-Null
          $msi = Get-ChildItem -Path "desktop/src-tauri/target/release/bundle/msi/*.msi", "desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
          $exe = Get-ChildItem -Path "desktop/src-tauri/target/release/bundle/nsis/*.exe", "desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $msi) { throw "Windows MSI bundle not found" }
          if (-not $exe) { throw "Windows NSIS bundle not found" }
          Copy-Item $msi.FullName "dist/release/kesher-desktop-windows-amd64.msi"
          Copy-Item $exe.FullName "dist/release/kesher-desktop-windows-amd64-setup.exe"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: dist/release/*
          if-no-files-found: error

# 3. macOS Desktop (Apple Silicon)
  build-desktop-macos-arm64:
    name: Build Desktop (macOS arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target
      - name: Install Opus toolchain
        run: |
          brew install opus pkg-config
          echo "PKG_CONFIG_PATH=/opt/homebrew/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"
      - name: Configure macOS signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ] && [ -n "$APPLE_CERTIFICATE_PASSWORD" ] && [ -n "$APPLE_SIGNING_IDENTITY" ]; then
            echo "APPLE_CERTIFICATE=$APPLE_CERTIFICATE" >> "$GITHUB_ENV"
            echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD" >> "$GITHUB_ENV"
            echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY" >> "$GITHUB_ENV"
          else
            echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"
          fi
      - name: Build
        run: |
          npm install
          npm --prefix desktop run tauri build -- --target aarch64-apple-darwin
      - name: Prepare release assets
        run: |
          mkdir -p dist/release
          dmg="$(find desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -maxdepth 1 -name '*.dmg' | head -n 1)"
          if [ -z "$dmg" ]; then
            echo "macOS arm64 DMG bundle not found" >&2
            exit 1
          fi
          cp "$dmg" dist/release/kesher-desktop-macos-arm64.dmg
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-arm64
          path: dist/release/*
          if-no-files-found: error

  # 4. macOS Desktop (Intel)
  build-desktop-macos-amd64:
    name: Build Desktop (macOS amd64)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target
      - name: Install Opus toolchain
        run: |
          brew install opus pkg-config
          echo "PKG_CONFIG_PATH=/usr/local/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"
      - name: Configure macOS signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ] && [ -n "$APPLE_CERTIFICATE_PASSWORD" ] && [ -n "$APPLE_SIGNING_IDENTITY" ]; then
            echo "APPLE_CERTIFICATE=$APPLE_CERTIFICATE" >> "$GITHUB_ENV"
            echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD" >> "$GITHUB_ENV"
            echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY" >> "$GITHUB_ENV"
          else
            echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"
          fi
      - name: Build
        run: |
          npm install
          npm --prefix desktop run tauri build -- --target x86_64-apple-darwin
      - name: Prepare release assets
        run: |
          mkdir -p dist/release
          dmg="$(find desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg -maxdepth 1 -name '*.dmg' | head -n 1)"
          if [ -z "$dmg" ]; then
            echo "macOS amd64 DMG bundle not found" >&2
            exit 1
          fi
          cp "$dmg" dist/release/kesher-desktop-macos-amd64.dmg
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-amd64
          path: dist/release/*
          if-no-files-found: error

  # 5. Release (Nur bei Tags!)
  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      [
        build,
        build-desktop-windows,
        build-desktop-macos-arm64,
        build-desktop-macos-amd64,
      ]
    runs-on: ubuntu-latest
    steps:
      - name: Download All
        uses: actions/download-artifact@v4
        with:
          path: all-assets
          merge-multiple: true

      - name: Resolve release notes file
        id: notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes_file="docs/releases/${version}.md"
          if [ -f "$notes_file" ]; then
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
            echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"
          else
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release (with notes file)
        if: steps.notes.outputs.has_notes == 'true'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "all-assets/*"
          token: ${{ secrets.GITHUB_TOKEN }}
          bodyFile: ${{ steps.notes.outputs.notes_file }}
          generateReleaseNotes: true

      - name: Create GitHub Release (generated notes only)
        if: steps.notes.outputs.has_notes != 'true'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "all-assets/*"
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true
