[target.x86_64-pc-windows-msvc]
# Windows: enable audio/webrtc features
# Keep lld only for the Windows target.
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[target.aarch64-apple-darwin]
# macOS Arm64: no audio capture features (uses browser WebRTC)
rustflags = []

[target.x86_64-apple-darwin]
# macOS Intel: no audio capture features (uses browser WebRTC)
rustflags = []
