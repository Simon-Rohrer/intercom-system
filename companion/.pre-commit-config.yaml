repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.28.0
    hooks:
      - id: gitleaks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-case-conflict
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^(src/.*\.(js|jsx|ts|tsx|css)|companion/.*\.(json|md|yml|yaml)|.*\.(json|md|yml|yaml))$
  - repo: local
    hooks:
      - id: companion-typescript-build
        name: companion-typescript-build
        entry: npm run build
        language: system
        pass_filenames: false
        files: ^(src/|companion/|package\.json|tsconfig(\.build)?\.json)
